name: daily-paper-digest

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "daily"
        type: choice
        options:
          - daily
          - dry-run
          - weekly-summary
  schedule:
    # 12:00 UTC ~= 08:00 America/New_York (DST periods)
    - cron: "0 12 * * *"

permissions:
  contents: write

jobs:
  run-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run digest pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
        run: |
          MODE="${{ github.event.inputs.mode || 'daily' }}"
          echo "Mode: ${MODE}"
          if [ "${MODE}" = "dry-run" ]; then
            python main.py --dry-run
          elif [ "${MODE}" = "weekly-summary" ]; then
            python main.py --weekly-summary
          else
            python main.py
          fi

      - name: Upload digest artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daily-digest
          path: digests/*.md
          if-no-files-found: warn

      - name: Commit and push digest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add digests/ weekly/
          if git diff --cached --quiet; then
            echo "No digest changes to commit."
            exit 0
          fi
          git commit -m "chore: update daily digest $(date -u +%F)"
          git push origin HEAD:${GITHUB_REF_NAME}
